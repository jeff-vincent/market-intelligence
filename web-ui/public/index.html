<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Consciousness</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e1e4eb;
      --muted: #8b8fa3;
      --accent: #6366f1;
      --accent-soft: #4f46e520;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    #stats { color: var(--muted); font-size: 0.85rem; }
    nav {
      display: flex;
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }
    nav button {
      background: none;
      border: none;
      color: var(--muted);
      padding: 0.75rem 1.25rem;
      cursor: pointer;
      font-size: 0.9rem;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    nav button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    nav button:hover { color: var(--text); }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 2rem; }
    .view { display: none; }
    .view.active { display: block; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card h3 { margin-bottom: 0.5rem; font-size: 1rem; }
    .card p { color: var(--muted); font-size: 0.9rem; }
    .card .meta {
      display: flex;
      gap: 1rem;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-t4 { background: var(--accent-soft); color: var(--accent); }
    .badge-t3 { background: #22c55e20; color: var(--green); }
    .badge-pass { background: #22c55e20; color: var(--green); }
    .badge-weak { background: #eab30820; color: var(--yellow); }
    .health-good { color: var(--green); }
    .health-mid { color: var(--yellow); }
    .health-bad { color: var(--red); }
    .entity-type { color: var(--accent); font-size: 0.8rem; text-transform: uppercase; }
    .actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .btn {
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }
    .btn:hover { border-color: var(--accent); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-danger { border-color: var(--red); color: var(--red); }
    .empty { text-align: center; color: var(--muted); padding: 3rem; }
    .briefing-body { white-space: pre-wrap; font-size: 0.9rem; margin-top: 0.5rem; }
    .source-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .rel-list { margin-top: 0.5rem; font-size: 0.85rem; color: var(--muted); }
    .feedback-row { display: flex; gap: 0.4rem; }
    #synthesise-box {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    #synthesise-box input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
    }
    #synth-result { margin-bottom: 1rem; }
  </style>
</head>
<body>

<header>
  <h1>Market Consciousness</h1>
  <div id="stats">loading...</div>
</header>

<nav>
  <button class="active" data-view="briefings">Briefings</button>
  <button data-view="items">Items</button>
  <button data-view="entities">Entities</button>
  <button data-view="sources">Sources</button>
</nav>

<main>
  <!-- Briefings View -->
  <div id="briefings" class="view active">
    <div id="synthesise-box">
      <input type="text" id="synth-input" placeholder="Ask a question across all signals...">
      <button class="btn btn-primary" onclick="synthesise()">Synthesise</button>
    </div>
    <div id="synth-result"></div>
    <div id="briefings-list"></div>
  </div>

  <!-- Items View -->
  <div id="items" class="view">
    <div id="items-list"></div>
  </div>

  <!-- Entities View -->
  <div id="entities" class="view">
    <div id="entities-list"></div>
  </div>

  <!-- Sources View -->
  <div id="sources" class="view">
    <div id="proposals-section"></div>
    <div id="sources-list"></div>
  </div>
</main>

<script>
const api = "/api";

// --- Navigation ---
document.querySelectorAll("nav button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.view).classList.add("active");
    loadView(btn.dataset.view);
  });
});

function loadView(name) {
  const loaders = { briefings: loadBriefings, items: loadItems, entities: loadEntities, sources: loadSources };
  if (loaders[name]) loaders[name]();
}

// --- Stats ---
async function loadStats() {
  try {
    const res = await fetch(`${api}/stats`);
    const d = await res.json();
    document.getElementById("stats").textContent =
      `${d.items} items · ${d.entities} entities · ${d.active_sources} sources · ${d.briefings} briefings`;
  } catch { document.getElementById("stats").textContent = "api offline"; }
}

// --- Briefings ---
async function loadBriefings() {
  const el = document.getElementById("briefings-list");
  try {
    const res = await fetch(`${api}/briefings?limit=10`);
    const docs = await res.json();
    if (!docs.length) { el.innerHTML = '<div class="empty">No briefings yet. The system generates them daily.</div>'; return; }
    el.innerHTML = docs.map(b => `
      <div class="card">
        <h3>${esc(b.formatted?.title || "Briefing")}</h3>
        <div class="briefing-body">${esc(b.formatted?.body || b.synthesis || JSON.stringify(b, null, 2))}</div>
        <div class="meta">
          <span>${timeAgo(b.created_at)}</span>
          <span>${(b.linked_items || []).length} linked items</span>
        </div>
      </div>`).join("");
  } catch { el.innerHTML = '<div class="empty">Failed to load briefings</div>'; }
}

// --- Items ---
async function loadItems() {
  const el = document.getElementById("items-list");
  try {
    const res = await fetch(`${api}/items?limit=50`);
    const docs = await res.json();
    if (!docs.length) { el.innerHTML = '<div class="empty">No items yet. Start the crawler to begin ingesting.</div>'; return; }
    el.innerHTML = docs.map(item => `
      <div class="card">
        <h3>${esc(item.title || item.url)}</h3>
        <p>${esc((item.summary || item.content || "").slice(0, 300))}</p>
        <div class="meta">
          ${item.tier ? `<span class="badge badge-${item.tier.toLowerCase()}">${item.tier}</span>` : ""}
          ${item.band ? `<span class="badge badge-${item.band.toLowerCase()}">${item.band}</span>` : ""}
          <span>${timeAgo(item.fetched_at)}</span>
          ${item.score ? `<span>score: ${item.score.toFixed(3)}</span>` : ""}
        </div>
        <div class="feedback-row actions">
          <button class="btn" onclick="feedback('${item._id}','useful')">👍 Useful</button>
          <button class="btn" onclick="feedback('${item._id}','interesting')">🤔 Interesting</button>
          <button class="btn btn-danger" onclick="feedback('${item._id}','noise')">👎 Noise</button>
        </div>
      </div>`).join("");
  } catch { el.innerHTML = '<div class="empty">Failed to load items</div>'; }
}

// --- Entities ---
async function loadEntities() {
  const el = document.getElementById("entities-list");
  try {
    const res = await fetch(`${api}/entities?limit=50`);
    const docs = await res.json();
    if (!docs.length) { el.innerHTML = '<div class="empty">No entities extracted yet.</div>'; return; }
    el.innerHTML = docs.map(e => `
      <div class="card">
        <div class="source-row">
          <div>
            <h3>${esc(e.name)}</h3>
            <span class="entity-type">${esc(e.type || "unknown")}</span>
          </div>
          <span>${e.mention_count || 0} mentions</span>
        </div>
        <p>${esc(e.summary || "")}</p>
      </div>`).join("");
  } catch { el.innerHTML = '<div class="empty">Failed to load entities</div>'; }
}

// --- Sources ---
async function loadSources() {
  const srcEl = document.getElementById("sources-list");
  const propEl = document.getElementById("proposals-section");
  try {
    // Proposals
    const pRes = await fetch(`${api}/proposals?status=PENDING_REVIEW`);
    const proposals = await pRes.json();
    if (proposals.length) {
      propEl.innerHTML = "<h3 style='margin-bottom:0.75rem'>Pending Proposals</h3>" +
        proposals.map(p => `
          <div class="card">
            <div class="source-row">
              <div>
                <h3>${esc(p.name)}</h3>
                <p>${esc(p.rationale || "")}</p>
              </div>
              <div class="actions">
                <button class="btn btn-primary" onclick="reviewProposal('${p._id}','approve')">Approve</button>
                <button class="btn btn-danger" onclick="reviewProposal('${p._id}','dismiss')">Dismiss</button>
              </div>
            </div>
          </div>`).join("");
    } else {
      propEl.innerHTML = "";
    }

    // Active sources
    const sRes = await fetch(`${api}/sources`);
    const sources = await sRes.json();
    if (!sources.length) { srcEl.innerHTML = '<div class="empty">No sources registered.</div>'; return; }
    srcEl.innerHTML = "<h3 style='margin:1.5rem 0 0.75rem'>Active Sources</h3>" +
      sources.map(s => {
        const hClass = s.health_score > 0.6 ? "health-good" : s.health_score > 0.3 ? "health-mid" : "health-bad";
        return `
          <div class="card">
            <div class="source-row">
              <div>
                <h3>${esc(s.name)}</h3>
                <p>${esc(s.url || "")}</p>
              </div>
              <div>
                <span class="${hClass}" style="font-size:1.1rem;font-weight:600">
                  ${(s.health_score || 0).toFixed(2)}
                </span>
                <button class="btn" style="margin-left:0.5rem"
                  onclick="toggleSource('${s._id}', ${!s.active})">
                  ${s.active ? "Disable" : "Enable"}
                </button>
              </div>
            </div>
          </div>`;
      }).join("");
  } catch { srcEl.innerHTML = '<div class="empty">Failed to load sources</div>'; }
}

// --- Actions ---
async function feedback(itemId, rating) {
  await fetch(`${api}/feedback`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ item_id: itemId, rating }),
  });
  loadItems();
}

async function toggleSource(id, active) {
  await fetch(`${api}/sources/${id}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ active }),
  });
  loadSources();
}

async function reviewProposal(id, action) {
  await fetch(`${api}/proposals/${id}/review`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action }),
  });
  loadSources();
}

async function synthesise() {
  const input = document.getElementById("synth-input");
  const result = document.getElementById("synth-result");
  const query = input.value.trim();
  if (!query) return;

  result.innerHTML = '<div class="card"><p>Synthesising...</p></div>';
  try {
    const res = await fetch(`${api}/synthesise`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query }),
    });
    const data = await res.json();
    result.innerHTML = `<div class="card"><div class="briefing-body">${esc(data.synthesis || JSON.stringify(data, null, 2))}</div></div>`;
  } catch (e) {
    result.innerHTML = `<div class="card"><p style="color:var(--red)">Error: ${esc(e.message)}</p></div>`;
  }
}

// --- Helpers ---
function esc(s) {
  if (!s) return "";
  const d = document.createElement("div");
  d.textContent = String(s);
  return d.innerHTML;
}

function timeAgo(ts) {
  if (!ts) return "";
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

// --- Init ---
loadStats();
loadBriefings();
setInterval(loadStats, 30000);
</script>
</body>
</html>
