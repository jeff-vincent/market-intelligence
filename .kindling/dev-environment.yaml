---
# LLM Gateway
apiVersion: apps.example.com/v1alpha1
kind: DevStagingEnvironment
metadata:
  name: mc-llm-gateway-dev
spec:
  deployment:
    image: mc-llm-gateway:dev
    replicas: 1
    port: 8082
    env:
      - name: OPENAI_API_KEY
        valueFrom:
          secretKeyRef:
            name: kindling-secret-openai-api-key
            key: OPENAI_API_KEY
      - name: ANTHROPIC_API_KEY
        valueFrom:
          secretKeyRef:
            name: kindling-secret-anthropic-api-key
            key: ANTHROPIC_API_KEY
  resources:
    limits:
      cpu: "250m"
      memory: "256Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  health-check-path: /healthz
  service:
    port: 8082
    type: ClusterIP

