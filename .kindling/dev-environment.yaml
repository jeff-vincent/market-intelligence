# Crawler — owns the shared dependencies
apiVersion: apps.example.com/v1alpha1
kind: DevStagingEnvironment
metadata:
  name: mc-crawler-dev
spec:
  deployment:
    image: mc-crawler:dev
    replicas: 1
    port: 8086
    env:
      - name: PORT
        value: "8086"
    healthCheck:
      path: /healthz
  service:
    port: 8086
    type: ClusterIP
  dependencies:
    - type: mongodb
      version: "7"
    - type: redis

---
# Relevance Filter
apiVersion: apps.example.com/v1alpha1
kind: DevStagingEnvironment
metadata:
  name: mc-relevance-filter-dev
spec:
  deployment:
    image: mc-relevance-filter:dev
    replicas: 1
    port: 8081
    env:
      - name: PORT
        value: "8081"
      - name: MONGO_URL
        value: "mongodb://devuser:devpass@mc-crawler-dev-mongodb:27017/mc?authSource=admin"
      - name: REDIS_URL
        value: "redis://mc-crawler-dev-redis:6379/0"
      - name: LLM_GATEWAY_URL
        value: "http://mc-llm-gateway-dev:8082"
    healthCheck:
      path: /healthz
  service:
    port: 8081
    type: ClusterIP

---
# LLM Gateway
apiVersion: apps.example.com/v1alpha1
kind: DevStagingEnvironment
metadata:
  name: mc-llm-gateway-dev
spec:
  deployment:
    image: mc-llm-gateway:dev
    replicas: 1
    port: 8082
    env:
      - name: OPENAI_API_KEY
        valueFrom:
          secretKeyRef:
            name: kindling-secret-openai-api-key
            key: OPENAI_API_KEY
      - name: ANTHROPIC_API_KEY
        valueFrom:
          secretKeyRef:
            name: kindling-secret-anthropic-api-key
            key: ANTHROPIC_API_KEY
    healthCheck:
      path: /healthz
  service:
    port: 8082
    type: ClusterIP

