# Crawler — owns the shared dependencies
apiVersion: apps.example.com/v1alpha1
kind: DevStagingEnvironment
metadata:
  name: mc-crawler-dev
spec:
  deployment:
    image: mc-crawler:dev
    replicas: 1
    port: 8080
    healthCheck:
      path: /healthz
  service:
    port: 8080
    type: ClusterIP
  dependencies:
    - type: mongodb
      version: "7"
    - type: redis

---
# Relevance Filter
apiVersion: apps.example.com/v1alpha1
kind: DevStagingEnvironment
metadata:
  name: mc-relevance-filter-dev
spec:
  deployment:
    image: mc-relevance-filter:dev
    replicas: 1
    port: 8080
    env:
      - name: MONGO_URL
        value: "mongodb://mc-crawler-dev-mongodb:27017/mc"
      - name: REDIS_URL
        value: "redis://mc-crawler-dev-redis:6379/0"
      - name: LLM_GATEWAY_URL
        value: "http://mc-llm-gateway-dev:8082"
    healthCheck:
      path: /healthz
  service:
    port: 8080
    type: ClusterIP

