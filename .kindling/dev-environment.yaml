# Crawler - owns the shared dependencies
apiVersion: apps.example.com/v1alpha1
kind: DevStagingEnvironment
metadata:
  name: mc-crawler-dev
spec:
  deployment:
    image: mc-crawler:dev
    replicas: 1
    port: 8086
    env:
      - name: PORT
        value: "8086"
      - name: LLM_GATEWAY_URL
        value: "http://mc-llm-gateway-dev:8082"
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  health-check-path: /healthz
  service:
    port: 8086
    type: ClusterIP
  dependencies:
    - type: mongodb
      version: "7"
    - type: redis

---
# Relevance Filter
